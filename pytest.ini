[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default markers
markers =
    smoke: Smoke tests - fast, critical path
    regression: Full regression suite
    ui: UI/browser tests
    api: API tests
    ado: Tests linked to Azure DevOps test cases
    slow: Tests expected to take longer than average

# Playwright settings
# NOTE: do NOT set --browser here; let CI matrix or local CLI control the browser.
# pytest-playwright defaults to chromium when --browser is not specified.
addopts =
    --screenshot=only-on-failure
    --video=retain-on-failure
    --tracing=retain-on-failure
    --output=reports/artifacts
    --html=reports/report.html
    --self-contained-html
    -v
    --tb=short
    --strict-markers
    --reruns=2
    --reruns-delay=1
    -n auto
    --dist=loadfile

# Logging
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
log_file = reports/pytest.log
log_file_level = DEBUG

# Timeout
timeout = 60

# Async mode
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
