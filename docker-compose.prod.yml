version: "3.9"
# ── Production Docker Compose ────────────────────────────────────────────────
# Used on AWS EC2. No local database — uses RDS via DATABASE_URL env var.
# Secrets come from .env (written by EC2 user_data.sh from SSM Parameter Store).
#
# Start:   docker compose -f docker-compose.prod.yml up -d
# Stop:    docker compose -f docker-compose.prod.yml down
# Logs:    docker compose -f docker-compose.prod.yml logs -f
# Rebuild: docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: jobbot-app:latest
    container_name: jobbot-app
    ports:
      - "5000:5000"
    volumes:
      - jobbot_data:/app/data          # persists screenshots only (resumes go to S3)
    env_file:
      - .env
    environment:
      FLASK_HOST: "0.0.0.0"
      FLASK_PORT: "5000"
      JOB_BOT_HEADLESS: "true"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  jobbot_data:
    driver: local
